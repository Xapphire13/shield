server {
    listen 80;
    server_name shield.home;

    # Root directory for your WASM site
    root /var/www/shield;
    index index.html;

    # Enable gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/js
        text/xml
        text/javascript
        application/javascript
        application/wasm
        application/json
        application/xml+rss;

    # API proxy - route /api requests to backend on port 3000
    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Brotli-compressed WASM files
    location ~* \.wasm\.br$ {
        add_header Content-Type application/wasm;
        add_header Content-Encoding br;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
    }

    # WASM-specific MIME type
    location ~* \.wasm$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
    }

    # Handle JavaScript files
    location ~* \.(js|mjs)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Handle CSS files
    location ~* \.css$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Handle HTML files
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=3600";
    }

    # Optional: Handle favicon
    location /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # Optional: Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Main location block - this should come LAST
    location / {
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # WASM requires these headers for proper loading
        add_header Cross-Origin-Embedder-Policy "require-corp";
        add_header Cross-Origin-Opener-Policy "same-origin";
    }
}
